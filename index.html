<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Story</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <div class="startPage">
      <h1>Dissonance</h1>
      <p>
        Dissonance is a text based interactive story. Would you like to start?
      </p>
      <button onclick="startGame()">START GAME</button>
    </div>
    <div class="locationCard" id="locationCard"></div>
    <div id="endingScene">
      <div id="endingCard">Bad ending</div>
    </div>
    <div class="mainCard">
      <div class="textCard">
        <div id="textCardContent"></div>
        <div class="textCardOptions">
          <div id="textCardOptions1"></div>
          <div id="textCardOptions2"></div>
          <div id="textCardOptions3"></div>
        </div>
      </div>
    </div>
  </body>
</html>
